name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to ACR
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build & Push Backend
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }} ./server
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }}

      # Build & Push Frontend
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend-react:${{ github.sha }} ./client/my-app
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend-react:${{ github.sha }}

      # Deploy Backend
      - name: Deploy Backend Container App
        run: |
          az containerapp update \
            --name backend \
            --resource-group YOUR_RESOURCE_GROUP \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }}

      # Deploy Frontend
      - name: Deploy Frontend Container App
        run: |
          az containerapp update \
            --name frontend \
            --resource-group YOUR_RESOURCE_GROUP \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/frontend-react:${{ github.sha }}