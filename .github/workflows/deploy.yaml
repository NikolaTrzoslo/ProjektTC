name: Build and Deploy to Azure Container Apps

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Azure
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Login to ACR
      - name: Login to ACR
        uses: azure/docker-login@v2
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # Build & Push Backend
      - name: Build and Push Backend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }} ./server
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }}

      # Build & Push Frontend
      - name: Build and Push Frontend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/frontend-react:${{ github.sha }} ./client/my-app
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/frontend-react:${{ github.sha }}

      # Deploy backend
      - name: Deploy Backend
        run: |
          az containerapp update \
            --name backend \
            --resource-group ProjektZaliczeniowy-JS-NT \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/backend-go:${{ github.sha }} \
            --set-env-vars MONGODB_URI="${{ secrets.MONGODB_URI }}" JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --min-replicas 1

          az containerapp ingress enable \
            --name backend \
            --resource-group ProjektZaliczeniowy-JS-NT \
            --target-port 8080 \
            --type external

          echo "Waiting for backend revision to stabilize..."
          sleep 15

      # Deploy frontend
      - name: Deploy Frontend
        run: |
          az containerapp update \
            --name frontend \
            --resource-group ProjektZaliczeniowy-JS-NT \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/frontend-react:${{ github.sha }} \
            --min-replicas 1

          az containerapp ingress enable \
            --name frontend \
            --resource-group ProjektZaliczeniowy-JS-NT \
            --target-port 80 \
            --type external

      # Verify deployments
      - name: Verify Deployment
        run: |
          echo "Checking backend status..."
          az containerapp show --name backend --resource-group ProjektZaliczeniowy-JS-NT --query 'properties.runningStatus' -o json

          echo "Checking frontend status..."
          az containerapp show --name frontend --resource-group ProjektZaliczeniowy-JS-NT --query 'properties.runningStatus' -o json

          echo "Backend FQDN: https://backend.yellowdune-c8c3c47f.polandcentral.azurecontainerapps.io/ping"
          echo "Frontend FQDN: https://frontend.yellowdune-c8c3c47f.polandcentral.azurecontainerapps.io"